apiVersion: v1
kind: Namespace
metadata:
  name: kubeshield-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeshield-controller
  namespace: kubeshield-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeshield-controller
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeshield-controller
subjects:
  - kind: ServiceAccount
    name: kubeshield-controller
    namespace: kubeshield-system
roleRef:
  kind: ClusterRole
  name: kubeshield-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeshield-controller
  namespace: kubeshield-system
  labels:
    app: kubeshield-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeshield-controller
  template:
    metadata:
      labels:
        app: kubeshield-controller
    spec:
      serviceAccountName: kubeshield-controller
      containers:
        - name: controller
          image: kubeshield-controller:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: webhook
            - containerPort: 8081
              name: health
          args:
            - --metrics-bind-address=0
            - --health-probe-bind-address=:8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kubeshield-webhook
  namespace: kubeshield-system
spec:
  selector:
    app: kubeshield-controller
  ports:
    - port: 8080
      targetPort: webhook
      protocol: TCP
      name: webhook
